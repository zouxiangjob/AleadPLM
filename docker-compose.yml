services:
  db:
    image: postgres:14
    container_name: my-postgres
    environment:
      POSTGRES_PASSWORD: abc123456
    ports:
      - "5432:5432"
    volumes:
      # 注意：Windows 路径建议使用 / 而不是 \，且不要加 d: 前缀，直接从 D:/ 开始更稳妥
      - D:/WSL/postgres_data:/var/lib/postgresql/data

  cache:
    image: redis:latest
    container_name: my-redis
    command: redis-server --requirepass abc123456 --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      # 补全 Redis 的数据映射
      - D:/WSL/redis_data:/data

  storage:
    image: minio/minio
    container_name: my-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: abc123456
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      # 补全 MinIO 的数据映射
      - D:/WSL/minio_data:/data
